# SPDX-License-Identifier: Apache-2.0
# 配套 zhaoming-embedded ch19 + 附录 B
# 4 个 demo 公用一份 prj.conf·按需开关由源码 #include 决定

# LED subsystem (ch19/19.7 用·演示同 ops 表跑多个 LED)
CONFIG_LED=y
CONFIG_LED_GPIO=y

# GPIO (demo2 / demo3 都用到)
CONFIG_GPIO=y

# 日志 + 串口 printk (demo2 看 label / demo3 看 offset / demo4 看 -ENOSYS 返回值)
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# 调小栈避免链接告警·stm32f4_disco SRAM 192KB 够用
CONFIG_MAIN_STACK_SIZE=2048
